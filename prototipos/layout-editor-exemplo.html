<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exemplo - Editor de Layout</title>
  <style>
    :root {
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --line: #d7dee7;
      --text: #16202a;
      --muted: #647184;
      --accent: #0f766e;
      --accent-2: #b45309;
      --code-bg: #121821;
      --code-line: #273241;
      --code-text: #e8eef6;
      --shadow: 0 14px 32px rgba(17, 24, 39, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(10px);
    }

    .title-group {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .crumb {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .name-input {
      width: min(520px, 100%);
      min-width: 0;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      padding: 4px 0;
    }

    .name-input:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    .file-pill {
      flex: 0 0 auto;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn,
    .text-btn,
    .primary-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 800;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    .text-btn,
    .primary-btn {
      padding: 0 12px;
    }

    .primary-btn {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .workspace {
      min-height: 0;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(340px, 44%) minmax(360px, 1fr);
      gap: 16px;
    }

    .editor-pane,
    .preview-pane {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      display: grid;
      overflow: hidden;
    }

    .editor-pane {
      grid-template-rows: auto auto 1fr;
    }

    .preview-pane {
      grid-template-rows: auto 1fr;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, 220px);
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .field input {
      min-width: 0;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }

    .field input[readonly] {
      color: var(--muted);
      background: #edf1f5;
      font-weight: 700;
    }

    .tabbar,
    .preview-toolbar {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .tabbar {
      justify-content: space-between;
    }

    .tabs,
    .devices {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .devices {
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .seg {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--muted);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .seg.active {
      border-color: #93c5bd;
      background: #e6f4f1;
      color: #0d5d57;
    }

    .width-control {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: min(100%, 330px);
    }

    .width-control input[type="range"] {
      width: 130px;
      accent-color: var(--accent);
    }

    .width-number {
      width: 76px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 7px;
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
    }

    .zoom-label {
      min-width: 58px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: right;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .code-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--code-bg);
    }

    .code-head {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid var(--code-line);
      color: #9fb0c3;
      font-size: 12px;
      font-weight: 800;
    }

    .code-editor {
      width: 100%;
      min-width: 0;
      min-height: 0;
      resize: none;
      border: 0;
      outline: none;
      padding: 16px;
      background: var(--code-bg);
      color: var(--code-text);
      font: 14px/1.55 Consolas, "Courier New", monospace;
      tab-size: 2;
    }

    .preview-toolbar {
      justify-content: space-between;
      gap: 12px;
    }

    .preview-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 900;
    }

    .preview-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .12);
    }

    .preview-stage {
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, .06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(15, 118, 110, .06) 1px, transparent 1px),
        #f5f7fa;
      background-size: 24px 24px;
      padding: 22px;
      display: grid;
      place-items: start center;
    }

    .device-shell {
      position: relative;
      max-width: 100%;
      min-height: 0;
      margin-inline: auto;
    }

    .device-scale {
      position: absolute;
      top: 0;
      left: 50%;
      transform-origin: top center;
      transition: transform .18s ease, width .18s ease;
    }

    .device-frame {
      width: 1200px;
      min-height: 540px;
      border: 1px solid #cfd8e3;
      background: #fff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .16);
      transition: width .18s ease;
      overflow: hidden;
    }

    .preview-iframe {
      width: 100%;
      min-height: 540px;
      display: block;
      border: 0;
      background: #fff;
    }

    .preview-content {
      min-height: 540px;
      padding: 42px;
      color: #13202d;
      background: #fff;
    }

    .hero-sample {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(220px, .8fr);
      gap: 28px;
      align-items: center;
    }

    .sample-eyebrow {
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 12px;
    }

    .hero-sample h2 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero-sample p {
      margin: 0 0 18px;
      color: #536174;
      line-height: 1.6;
      max-width: 56ch;
    }

    .sample-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sample-actions a {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      padding: 0 13px;
      text-decoration: none;
      font-weight: 900;
    }

    .sample-actions a:first-child {
      background: #0f766e;
      color: #fff;
    }

    .sample-actions a:last-child {
      color: #0f766e;
      border: 1px solid #93c5bd;
    }

    .visual-box {
      min-height: 280px;
      border: 1px solid #d7dee7;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .12), rgba(180, 83, 9, .13)),
        #f8fafc;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .metric-stack {
      width: min(100%, 260px);
      display: grid;
      gap: 10px;
    }

    .metric {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(15, 23, 42, .12);
      background: rgba(255, 255, 255, .82);
      padding: 10px;
    }

    .metric b {
      font-size: 22px;
      color: #0f766e;
    }

    .metric span {
      color: #536174;
      font-size: 13px;
      font-weight: 800;
    }

    .mobile-bottom {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .mobile-bottom button {
      min-height: 44px;
      border: 0;
      border-right: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-weight: 900;
    }

    .mobile-bottom button:last-child {
      border-right: 0;
    }

    .mobile-bottom .active {
      color: var(--accent);
      background: #e6f4f1;
    }

    @media (max-width: 960px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 1fr) minmax(420px, 1fr);
      }
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 12px;
      }

      .name-row {
        align-items: stretch;
        flex-direction: column;
      }

      .file-pill {
        max-width: 100%;
      }

      .actions .text-btn {
        display: none;
      }

      .workspace {
        padding: 0;
        gap: 0;
        grid-template-rows: 1fr auto;
      }

      .editor-pane,
      .preview-pane {
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .preview-pane {
        display: none;
      }

      .workspace.show-preview .editor-pane {
        display: none;
      }

      .workspace.show-preview .preview-pane {
        display: grid;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .preview-stage {
        padding: 12px;
      }

      .preview-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .devices {
        justify-content: flex-start;
      }

      .preview-content {
        padding: 24px;
      }

      .hero-sample {
        grid-template-columns: 1fr;
      }

      .hero-sample h2 {
        font-size: 30px;
      }

      .mobile-bottom {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title-group">
        <div class="crumb">Layouts / Editando</div>
        <div class="name-row">
          <input class="name-input" value="Section-6" aria-label="Nome do layout" />
          <div class="file-pill">variants/section-6.js</div>
        </div>
      </div>

      <div class="actions" aria-label="Acoes do editor">
        <button class="icon-btn" title="Voltar">←</button>
        <button class="icon-btn" title="Copiar codigo">⧉</button>
        <button class="text-btn">Ver arquivo</button>
        <button class="primary-btn">Salvar layout</button>
      </div>
    </header>

    <section class="workspace" id="workspace">
      <section class="editor-pane" aria-label="Editor de codigo">
        <div class="meta-grid">
          <div class="field">
            <label for="tags">Tags</label>
            <input id="tags" value="Section 6, Hero, 6" />
          </div>
          <div class="field">
            <label for="layout-id">ID gerado</label>
            <input id="layout-id" value="section-6" readonly />
          </div>
        </div>

        <div class="tabbar">
          <div class="tabs" role="tablist" aria-label="Codigo">
            <button class="seg active" data-editor-tab="html">HTML</button>
            <button class="seg" data-editor-tab="css">CSS</button>
          </div>
          <div class="status">Preview ao vivo</div>
        </div>

        <div class="code-wrap">
          <div class="code-head">
            <span id="code-label">layout.html</span>
            <span>Ln 1, Col 1</span>
          </div>
          <textarea class="code-editor" id="code-editor" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="preview-pane" aria-label="Visualizacao">
        <div class="preview-toolbar">
          <div class="preview-title">
            <span class="preview-dot"></span>
            <span>Visualizacao</span>
          </div>
          <div class="devices" aria-label="Tamanho do preview">
            <button class="seg" data-preview-width="390">390</button>
            <button class="seg" data-preview-width="760">760</button>
            <button class="seg active" data-preview-width="1200">1200</button>
            <button class="seg" data-preview-width="1500">1500</button>
            <label class="width-control" for="preview-width-range">
              <input id="preview-width-range" type="range" min="340" max="1500" value="1200" />
              <input class="width-number" id="preview-width-number" type="number" min="340" max="1500" value="1200" />
              <span class="zoom-label" id="preview-zoom-label">100%</span>
            </label>
            <button class="icon-btn" id="preview-refresh-btn" title="Recarregar preview">↻</button>
          </div>
        </div>

        <div class="preview-stage">
          <div class="device-shell" id="device-shell">
            <div class="device-scale" id="device-scale">
              <div class="device-frame" id="device-frame">
                <iframe class="preview-iframe" id="preview-iframe" title="Preview section-6"></iframe>
              </div>
            </div>
          </div>
        </div>
      </section>

      <nav class="mobile-bottom" aria-label="Navegacao mobile">
        <button class="active" data-mobile-view="html">HTML</button>
        <button data-mobile-view="css">CSS</button>
        <button data-mobile-view="preview">Preview</button>
      </nav>
    </section>
  </main>

  <script type="text/plain" id="section-html-source"><section class="section-6" aria-label="Destaque do produto com texto">

  <script type="text/plain" id="section-css-source">.section-6 {
  --pos-y: 50%;
  --pos-x: 7%;
  --color-title: #ffe178;
  --bg-box: rgba(0, 0, 0, 0.33);

  width: 100%;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
}

.section-6__image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 20px;
}

.section-6__content {
  position: absolute;
  top: var(--pos-y);
  left: clamp(1%, var(--pos-x), 100%);
  transform: translateY(-50%);
  max-width: min(40%, 480px);
  z-index: 10;
  background-color: var(--bg-box);
  padding: clamp(12px, 2vw, 20px);
  border-radius: 15px;
  backdrop-filter: blur(4px);
}

.section-6__title {
  font-size: clamp(1.4rem, 3.5vw, 2.6rem);
  color: var(--color-title);
  margin: 0 0 10px;
  line-height: 1.2;
  text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
  font-weight: 800;
}

.section-6__description {
  font-size: clamp(0.95rem, 2vw, 1.4rem);
  color: #fff;
  margin: 0 0 24px;
  line-height: 1.5;
  text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.35);
}

@media (max-width: 760px) {
  .section-6__ {
    border-radius: 0;
  }

  .section-6__content {
    position: static;
    transform: none;
    max-width: 100%;
    padding: 24px 20px 0 20px;
    background: transparent;
    backdrop-filter: none;
    text-align: center;
  }

  .section-6__title {
    font-size: 1.8rem;
    color: #333;
    text-shadow: none;
  }

  .section-6__description {
    margin-bottom: 0;
    font-size: 1.1rem;
    color: #555;
    text-shadow: none;
  }

  .section-6__image {
    width: 95%;
    margin: auto;
    height: auto;
    display: block;
    border-radius: 20px;
  }
}

@media (max-width: 480px) {
  .section-6__title {
    font-size: 1.5rem;
  }

  .section-6__description {
    font-size: 1rem;
  }
}</script>

  <script>
    var htmlSample = document.getElementById('section-html-source').textContent.trim();
    var cssSample = document.getElementById('section-css-source').textContent.trim();
    var activeEditorTab = 'html';
    var previewTimer = null;
    var previewWidth = 1200;
    var codeEditor = document.getElementById('code-editor');
    codeEditor.value = htmlSample;

    function buildPreviewDoc(html, css) {
      return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">' +
        '<style>body{margin:0;padding:0;background:#fff;font-family:Arial,sans-serif;}*{box-sizing:border-box;}</style>' +
        '<style>' + css + '</style></head><body>' + html + '</body></html>';
    }

    function refreshPreview() {
      document.getElementById('preview-iframe').srcdoc = buildPreviewDoc(htmlSample, cssSample);
    }

    function clampPreviewWidth(value) {
      var num = Number(value);
      if (!Number.isFinite(num)) num = 1200;
      return Math.max(340, Math.min(1500, Math.round(num)));
    }

    function resizeIframeHeight() {
      var iframe = document.getElementById('preview-iframe');
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        var height = Math.max(
          540,
          doc.documentElement.scrollHeight,
          doc.body ? doc.body.scrollHeight : 0
        );
        iframe.style.height = height + 'px';
      } catch (err) {
        iframe.style.height = '540px';
      }
      fitPreviewToStage();
    }

    function fitPreviewToStage() {
      var shell = document.getElementById('device-shell');
      var scaleEl = document.getElementById('device-scale');
      var frame = document.getElementById('device-frame');
      var iframe = document.getElementById('preview-iframe');
      var stage = document.querySelector('.preview-stage');
      var available = stage.clientWidth - 2;
      if (available < 40) return;
      var scale = Math.min(1, available / previewWidth);
      var frameHeight = Math.max(540, iframe.offsetHeight || frame.offsetHeight || 540);

      frame.style.width = previewWidth + 'px';
      scaleEl.style.width = previewWidth + 'px';
      scaleEl.style.transform = 'translateX(-50%) scale(' + scale + ')';
      shell.style.width = Math.ceil(previewWidth * scale) + 'px';
      shell.style.height = Math.ceil(frameHeight * scale) + 'px';
      document.getElementById('preview-zoom-label').textContent = Math.round(scale * 100) + '%';
    }

    function setPreviewWidth(value) {
      previewWidth = clampPreviewWidth(value);
      document.getElementById('preview-width-range').value = previewWidth;
      document.getElementById('preview-width-number').value = previewWidth;
      document.querySelectorAll('[data-preview-width]').forEach(function (btn) {
        btn.classList.toggle('active', Number(btn.dataset.previewWidth) === previewWidth);
      });
      fitPreviewToStage();
    }

    function schedulePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(refreshPreview, 150);
    }

    function syncCurrentEditor() {
      if (activeEditorTab === 'css') cssSample = codeEditor.value;
      else htmlSample = codeEditor.value;
    }

    document.getElementById('preview-iframe').addEventListener('load', resizeIframeHeight);
    refreshPreview();
    setPreviewWidth(previewWidth);

    document.querySelectorAll('[data-editor-tab]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        syncCurrentEditor();
        document.querySelectorAll('[data-editor-tab]').forEach(function (item) {
          item.classList.remove('active');
        });
        btn.classList.add('active');
        var label = document.getElementById('code-label');
        activeEditorTab = btn.dataset.editorTab;
        if (btn.dataset.editorTab === 'css') {
          codeEditor.value = cssSample;
          label.textContent = 'layout.css';
        } else {
          codeEditor.value = htmlSample;
          label.textContent = 'layout.html';
        }
      });
    });

    codeEditor.addEventListener('input', function () {
      syncCurrentEditor();
      schedulePreview();
    });

    document.querySelectorAll('[data-preview-width]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        setPreviewWidth(btn.dataset.previewWidth);
      });
    });

    document.getElementById('preview-width-range').addEventListener('input', function () {
      setPreviewWidth(this.value);
    });

    document.getElementById('preview-width-number').addEventListener('input', function () {
      setPreviewWidth(this.value);
    });

    document.getElementById('preview-refresh-btn').addEventListener('click', function () {
      syncCurrentEditor();
      refreshPreview();
    });

    window.addEventListener('resize', fitPreviewToStage);

    document.querySelectorAll('[data-mobile-view]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('[data-mobile-view]').forEach(function (item) {
          item.classList.remove('active');
        });
        btn.classList.add('active');
        document.getElementById('workspace').classList.toggle('show-preview', btn.dataset.mobileView === 'preview');
        if (btn.dataset.mobileView !== 'preview') {
          document.querySelector('[data-editor-tab="' + btn.dataset.mobileView + '"]').click();
        } else {
          setTimeout(fitPreviewToStage, 0);
        }
      });
    });
  </script>
</body>
</html>
