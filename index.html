<!DOCTYPE html>
<!--
  index.html - shell principal do SenkoLib

  REGRA DE MANUTENCAO DO GUIA:
  - Toda alteracao de arquitetura, feature, fluxo, erro conhecido, GitHub,
    estilos globais ou regra de dados deve atualizar tambem o guia interno em
    app/prototype/senko-guide.
  - O guia e prioridade maxima para manutencao: se o codigo mudou e o guia
    ficou desatualizado, a mudanca ainda nao esta completa.

  RESPONSABILIDADE:
  - Montar somente cabecalho, tema e raiz neutra das features.
  - Carregar um register.js por feature disponivel.
  - Nao conhecer grids, modais, dados ou integracoes internas.

  Cada register.js controla a view, os estilos, os dados e a inicializacao da
  sua propria feature. O Preview continua em app/prototype enquanto for beta.
-->
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenkoLib</title>
  <script>(function () { try { var t = localStorage.getItem('senkolib_theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) { } })();</script>
  <script>
    /*
     * Cada abertura recebe uma chave nova. CSS, JavaScript e dados locais
     * carregados pelo shell ou pelas features recebem essa chave na URL.
     */
    (function initializeFreshAssets() {
      var token = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

      function freshUrl(path) {
        var url = new URL(path, document.baseURI);
        var isLocal = url.protocol === 'file:' || url.origin === window.location.origin;
        if (isLocal) url.searchParams.set('_senko_reload', token);
        return url.href;
      }

      function escapeAttribute(value) {
        return value.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      }

      window.SenkoFreshAssets = {
        token: token,
        url: freshUrl,
        writeStyle: function (path) {
          document.write('<link rel="stylesheet" href="' + escapeAttribute(freshUrl(path)) + '">');
        },
        writeScript: function (path) {
          document.write('<script src="' + escapeAttribute(freshUrl(path)) + '"><\/script>');
        }
      };

      /*
       * HTTP/HTTPS tambem recebe um worker sem armazenamento. file:// nao
       * aceita Service Worker e continua coberto pelas URLs versionadas.
       */
      if ('serviceWorker' in navigator && /^https?:$/.test(window.location.protocol)) {
        var controllerReloadKey = 'senkolib_sw_controller_reload_done';
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          /*
           * Quando um worker novo assume a pagina, recarrega uma unica vez na
           * sessao para que o usuario nao precise de CTRL+SHIFT+R.
           */
          try {
            if (sessionStorage.getItem(controllerReloadKey)) return;
            sessionStorage.setItem(controllerReloadKey, '1');
          } catch (error) { }
          window.location.reload();
        });

        navigator.serviceWorker.register('./sw.js', {
          updateViaCache: 'none'
        }).then(function (registration) {
          return registration.update();
        }).catch(function (error) {
          console.warn('[SenkoLib] Nao foi possivel ativar o reload sem cache:', error);
        });
      }
    })();
  </script>
  <script>
    SenkoFreshAssets.writeStyle('app/shared/styles/senko-tokens.css');
    SenkoFreshAssets.writeStyle('app/shared/styles/senko-components.css');
    SenkoFreshAssets.writeStyle('app/shell/styles/styles.css');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="app/shared/assets/senko.ico" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo" id="logoHome" style="cursor:pointer;" title="Ir para a primeira feature">
        <img src="app/shared/assets/senko.png" class="logo-img" alt="SenkoLib" />
        <span class="logo-text">Senko<strong>Lib</strong></span>
      </div>
      <div class="header-actions">
        <!-- Controles globais do shell: independem das views das features. -->
        <button class="senko-global-create-trigger" id="senkoGlobalCreateBtn" title="Criar no SenkoLib"
          aria-label="Abrir criação global" aria-haspopup="dialog" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
        </button>
        <a href="https://maiconsantossilvah-dot.github.io/Criador-de-FAQ/" target="_blank"
          rel="noopener noreferrer">
          <button class="theme-toggle github-config-toggle" id="senkoForLayoutLab" title="Ir para o LayoutLab"
            aria-label="Configurar GitHub" type="button" hidden>
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <!-- Losango externo -->
              <rect x="17" y="18" width="63" height="63" rx="2" fill="none" stroke="currentColor" stroke-width="8"
                transform="rotate(45 50 50)"></rect>
              <!-- Quadrado central -->
              <rect x="43" y="43" width="14" height="16" rx="1" fill="currentColor" transform="rotate(45 50 50)"></rect>
            </svg>
          </button></a>
        <button class="theme-toggle guide-toggle" id="senkoGuideBtn" title="Abrir guia do projeto"
          aria-label="Abrir guia do projeto" type="button" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5Z" />
            <path d="M8 6h8M8 10h8M8 14h5" />
          </svg>
        </button>
        <button class="theme-toggle github-config-toggle" id="senkoGithubConfigBtn" title="Configurar GitHub"
          aria-label="Configurar GitHub" type="button" hidden>
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.17c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.74.08-.74 1.21.09 1.85 1.24 1.85 1.24 1.07 1.84 2.82 1.31 3.51 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z" />
          </svg>
        </button>
        <div id="ghDeployDot" title="Publicando no GitHub Pages..." hidden></div>
        <button class="theme-toggle" id="themeToggleBtn" title="Tema escuro">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Raiz neutra das features. Cada feature monta sua propria tela aqui, sem depender da Biblioteca. -->
  <div id="senkoFeatureRoot"></div>

  <script>
    SenkoFreshAssets.writeScript('app/shell/scripts/senko-shell.js');
    SenkoFreshAssets.writeScript('app/prototype/senko-guide/register.js');
    SenkoFreshAssets.writeScript('app/prototype/global-create/register.js');
    SenkoFreshAssets.writeScript('app/features/biblioteca/register.js');
    SenkoFreshAssets.writeScript('app/features/colecoes/register.js');
    SenkoFreshAssets.writeScript('app/features/imagens/scripts/register.js');
    SenkoFreshAssets.writeScript('app/features/sources/scripts/register.js');
    SenkoFreshAssets.writeScript('app/prototype/gamer-preview/register.js');
  </script>
  <script>
    (function () {
      var KEY = 'senkolib_theme';
      var SUN = '<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>';
      var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

      function currentTheme() {
        try {
          return localStorage.getItem(KEY) || 'light';
        } catch (error) {
          return 'light';
        }
      }

      function apply(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        var icon = document.getElementById('themeIcon');
        var btn = document.getElementById('themeToggleBtn');
        if (icon) icon.innerHTML = theme === 'dark' ? SUN : MOON;
        if (btn) btn.title = theme === 'dark' ? 'Tema claro' : 'Tema escuro';
      }

      apply(currentTheme());

      document.addEventListener('DOMContentLoaded', function () {
        apply(currentTheme());
        document.getElementById('themeToggleBtn').addEventListener('click', function () {
          var next = (document.documentElement.getAttribute('data-theme') || 'light') === 'dark' ? 'light' : 'dark';
          localStorage.setItem(KEY, next);
          apply(next);
        });
      });
    })();
  </script>
</body>

</html>
